<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    {% extends 'base.html' %}

{% block content %}

<div class="card">

    <img src="{{ url_for('static', filename='images/' + movie.image) }}"
         class="movie-details-img">

    <div class="card-body">

        <h2>{{ movie.title }}</h2>

        <p><strong>Year:</strong> {{ movie.year }}</p>

        <p>{{ movie.description }}</p>

        <a href="{{ url_for('index') }}"
           class="btn btn-dark">
           Back
        </a>

    </div>

</div>

{% endblock %}
</head>
<body>

</body>
</html>
