<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    {% if current_user.is_authenticated %}
<a href="{{ url_for('add_movie') }}"
   class="btn btn-success mb-3">
   Add Movie
</a>
{% endif %}
{% extends 'base.html' %}

{% block content %}

<h1 class="text-center mb-4">Korean Thriller Movies</h1>

<div class="row">

    {% for movie in movies %}
    <div class="col-md-4 mb-4">

        <div class="card h-100">

            <img src="{{ url_for('static', filename='images/' + movie.image) }}"
                 class="card-img-top movie-img">

            <div class="card-body">

                <h5>{{ movie.title }}</h5>

                <p>{{ movie.year }}</p>

                <a href="{{ url_for('movie_details', id=movie.id) }}"
                   class="btn btn-dark">
                   Details
                </a>

            </div>

        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
    {% if current_user.is_authenticated %}

<a href="{{ url_for('edit_movie', id=movie.id) }}"
   class="btn btn-warning">
   Edit
</a>

<a href="{{ url_for('delete_movie', id=movie.id) }}"
   class="btn btn-danger">
   Delete
</a>

{% endif %}
</head>
<body>

</body>
</html>
