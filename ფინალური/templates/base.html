<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <!DOCTYPE html>
<html>
<head>
    <title>Korean Movies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">Korean Movies</a>

        <div>
            {% if current_user.is_authenticated %}
                <a class="btn btn-light" href="{{ url_for('logout') }}">
                    Logout
                </a>
            {% else %}
                <a class="btn btn-light" href="{{ url_for('login') }}">
                    Login
                </a>

                <a class="btn btn-warning" href="{{ url_for('register') }}">
                    Register
                </a>
            {% endif %}
        </div>
    </div>
</nav>


<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
<a class="btn btn-info" href="{{ url_for('about') }}">
    About
</a>

</body>
</head>
<body>

</body>
</html>
